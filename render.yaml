services:
  - type: web
    name: app-review-classifier
    runtime: docker
    rootDir: app-review-classifier
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MODEL_MODE
        value: rules
      - key: MLFLOW_TRACKING_URI
        sync: false          # Render 대시보드에서 직접 입력
      - key: GOOGLE_SHEET_NAME
        sync: false          # 스프레드시트 이름 (예: 앱리뷰분류기)
      - key: GOOGLE_SHEET_ID
        sync: false          # 이름 대신 ID 사용 시
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false          # 서비스계정 JSON 한 줄 문자열
      - key: CANARY_ENABLED
        value: "false"
      - key: LOW_CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: LOW_CONFIDENCE_LIMIT
        value: "5"
      - key: GH_TOKEN
        sync: false
      - key: GH_REPO
        sync: false
